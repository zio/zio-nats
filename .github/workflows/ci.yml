name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21', '25']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Check scalafmt formatting
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources

      - name: Compile
        run: ./mill zioNats.compile

      - name: Run tests
        run: ./mill zioNats.test
