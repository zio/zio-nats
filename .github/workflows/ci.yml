name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Mill
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.mill
        key: ${{ runner.os }}-mill-${{ hashFiles('build.mill') }}
        restore-keys: |
          ${{ runner.os }}-mill-

    - name: Install NATS Server
      run: |
        curl -L https://github.com/nats-io/nats-server/releases/download/v2.10.4/nats-server-v2.10.4-linux-amd64.zip -o nats-server.zip
        unzip nats-server.zip
        sudo mv nats-server-v2.10.4-linux-amd64/nats-server /usr/local/bin/

    - name: Make mill executable
      run: chmod +x ./mill

    - name: Compile
      run: ./mill zioNats.compile

    - name: Run tests
      run: ./mill zioNats.test